# 20 Newsgroups configuration for HMoG
#
# Key findings:
#   - Single cycle converges well; additional cycles with decaying LR degrade performance.
#   - Symmetric precision regularization (1e-2) is essential for stability at K>=60.
#     Without it, K>=60 produces cuSolver/NaN errors. The regularizer pushes latent
#     precision eigenvalues toward 1.0 (isotropic), preventing covariance degeneracy.
#   - ent_reg=1e-1 is the optimal entropy regularization for NG20 (lower than MNIST's 3e-1).
#   - batch_steps=100 is optimal at ld=400. Higher values (200+) cause faster overfitting.
#   - K=80 (4x overclustering) gives best raw NMI (0.589) and KL merge NMI (0.529).
#     K=60 gives best CoA merge NMI (0.515). Default K=80 favors raw + KL merge.
#   - Full-batch EM is essential; SGD eliminates merge signal.
defaults:
  - hmog
  - _self_

# Model architecture
latent_dim: 400
n_clusters: 80

# Single cycle — more cycles hurt on NG20
num_cycles: 1
lr_scales: []
lgm_noise_scale: 0.01
mix_noise_scale: 0.01

# Pre-training phases disabled (direct full-gradient only)
pre:
  n_epochs: 0

lgm:
  n_epochs: 0

mix:
  n_epochs: 0

full:
  lr: 1e-4
  n_epochs: 200
  batch_steps: 100
  grad_clip: 10
  min_prob: 1e-5
  obs_min_var: 1e-5
  lat_min_var: 1e-5
  upr_prs_reg: 1e-2
  lwr_prs_reg: 1e-2
  l1_reg: 0
  l2_reg: 1e-4
  weight_decay: 1e-4
  ent_reg: 1e-1
  epoch_reset: true
