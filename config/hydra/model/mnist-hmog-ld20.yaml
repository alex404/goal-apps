defaults:
  - hmog
  - _self_

latent_dim: 20
n_clusters: 200

num_cycles: 3

lgm_noise_scale: 0.01
mix_init_scale: 0.01

pre:
  n_epochs: 0

lgm:
  n_epochs: 0

mix:
  n_epochs: 0

full:
  lr: 1e-4
  n_epochs: 200
  batch_steps: 500
  grad_clip: 10
  min_prob: 1e-5
  obs_min_var: 1e-5
  lat_min_var: 1e-5
  l1_reg: 1e-3
  l2_reg: 1e-4
  weight_decay: 0
  upr_prs_reg: 1e-3
  lwr_prs_reg: 1e-3
  ent_reg: 3e-1
  epoch_reset: true

analyses:
  generative_samples:
    enabled: true
    n_samples: 100
  cluster_statistics:
    enabled: true
  co_assignment_hierarchy:
    enabled: true
  optimal_merge:
    enabled: false
    filter_empty_clusters: true
    min_cluster_size: 0.0005
  co_assignment_merge:
    enabled: true
    filter_empty_clusters: true
    min_cluster_size: 0.0005
  kl_hierarchy:
    enabled: true
  kl_merge:
    enabled: true
    filter_empty_clusters: true
    min_cluster_size: 0.0005
