# MFA debug config: small model, no regularization, random init
# Goal: find init_scale that gives stable random initialization
defaults:
  - mfa
  - _self_

latent_dim: 20
n_clusters: 200
kmeans_init: false
init_scale: 0.01
min_var: 0.01

trainer:
  lr: 1e-4
  n_epochs: 300
  batch_steps: 100
  grad_clip: 0.0    # off
  log_freq: 10

  # Regularization — minimal: only clip W growth + grad clip
  l1_reg: 1e-4
  l2_reg: 0
  weight_decay: 1e-4
  ent_reg: 3e-2

  min_prob: 1e-4
  obs_min_var: 0.01
  obs_max_var: 10.0
  lat_min_var: 1e-3

  epoch_reset: false
  obs_jitter_var: 0.0
  lat_jitter_var: 0.0

analyses:
  generative_samples:
    enabled: false
  cluster_statistics:
    enabled: true
  co_assignment_hierarchy:
    enabled: true
  co_assignment_merge:
    enabled: true
    filter_empty_clusters: true
    min_cluster_size: 0.0005
  optimal_merge:
    enabled: false
