# MFA configuration for MNIST
defaults:
  - mfa
  - _self_

latent_dim: 10
n_clusters: 150
init_scale: 0.01
min_var: 0.01

trainer:
  lr: 1e-4
  n_epochs: 1000
  # batch_size: 512  # commented out = full dataset E-step (approximate EM)
  batch_steps: 100
  grad_clip: 1
  log_freq: 10

  # Regularization
  l1_reg: 0
  l2_reg: 1e-3     # L2 on interaction params (loading matrix W) only — prevents unbounded growth
  upr_prs_reg: 1e-3
  lwr_prs_reg: 1e-3
  mixture_entropy_reg: 1e-2

  min_prob: 1e-4
  obs_min_var: 0.01   # match model init min_var; prevents residual variance collapse
  obs_max_var: 10.0   # matches reference sqrt_D ≤ 1.0 → var ≤ 1.0
  lat_min_var: 1e-3

  epoch_reset: false

  # Jitter (optional, for additional stability)
  obs_jitter_var: 0.0
  lat_jitter_var: 0.0

analyses:
  generative_samples:
    enabled: true
    n_samples: 100
  cluster_statistics:
    enabled: true
  co_assignment_hierarchy:
    enabled: true
  co_assignment_merge:
    enabled: true
    filter_empty_clusters: true
    min_cluster_size: 0.0005
  optimal_merge:
    enabled: false
    filter_empty_clusters: true
    min_cluster_size: 0.0005
