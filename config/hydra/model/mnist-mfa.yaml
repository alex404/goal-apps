# MFA configuration for MNIST
# Based on gans-n-gmms hyperparams (ld=5, k=150, kmeans init).
# Full-batch approximate EM with L2+ent_reg+AdamW+epoch_reset.
#
# Regularization notes:
# - L1 is counterproductive at low latent dimensions. With ld=5, each
#   component's 784x5 loading matrix has no redundancy — L1 kills entire
#   latent directions, hollowing out components. Combined with ent_reg
#   (which keeps those components alive) and L2, this causes catastrophic
#   collapse around epoch 300. Avoid L1 for low-rank MFA.
# - L2+ent_reg is stable at ld=5/k=150 with kmeans init, but collapses
#   at ld=10 (~epoch 420) or with random init (~epoch 350). The total
#   L2 "dose" (weight_decay * n_epochs * n_params) matters — scale down L2 or
#   epochs when increasing latent_dim.
# - No regularization is universally stable (tested ld=10, random init,
#   500 epochs) but produces worse clustering merge performance.
defaults:
  - mfa
  - _self_

latent_dim: 10
n_clusters: 200
kmeans_init: true
init_scale: 0.01
min_var: 0.01

trainer:
  lr: 1e-5
  n_epochs: 500
  batch_steps: 1000
  grad_clip: 10
  log_freq: 10

  l2_reg: 0
  weight_decay: 1e-4
  ent_reg: 1e-2

  obs_min_var: 1e-6
  epoch_reset: true

analyses:
  generative_samples:
    enabled: true
    n_samples: 100
  cluster_statistics:
    enabled: true
  co_assignment_hierarchy:
    enabled: true
  co_assignment_merge:
    enabled: true
  optimal_merge:
    enabled: false
    filter_empty_clusters: true
    min_cluster_size: 0.0005
